
<!DOCTYPE html>
<html>
<head>
    <title>FDD CAD Geofenced Incidents Map</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .incident-popup { max-width: 300px; }
        .incident-type { font-weight: bold; color: #d32f2f; }
        .incident-address { margin: 5px 0; }
        .incident-time { color: #666; font-size: 0.9em; }
        .geofence-legend { position: absolute; top: 10px; right: 10px; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; }
        .legend-item { margin: 5px 0; }
        .legend-color { display: inline-block; width: 20px; height: 15px; margin-right: 8px; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="geofence-legend">
        <h3>Geofences</h3>
        <div id="legend-content"></div>
    </div>

    <script>
        // Initialize map
        const map = L.map('map').setView([36.31990449360526, -94.15771662743684], 12);
        
        // Add tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        // Geofences data
        const geofences = {"Rogers_city": {"center_lat": 36.332, "center_lon": -94.1185, "radius_miles": 15, "color": "#FF0000", "polygon_points": null}, "Fayetteville_city": {"center_lat": 36.0626, "center_lon": -94.1574, "radius_miles": 20, "color": "#0000FF", "polygon_points": null}, "Test_Area": {"center_lat": 36.34, "center_lon": -94.12, "radius_miles": 5, "color": "#00FF00", "polygon_points": null}};
        
        // Incidents data
        const incidents = [{"lat": 36.303383575, "lon": -94.175434943, "type": "Vehicle Lockout", "address": "2203 S PROMENADE BLVD, STE 14100, ROGERS, AR", "time": "2025-09-18T17:48:52", "geofence": "Rogers_city", "distance": 3.74}, {"lat": 36.3126837479, "lon": -94.1478465893, "type": "Vehicle Fire", "address": "1829 S BETH DR, ROGERS, AR", "time": "2025-09-18T16:33:35", "geofence": "Rogers_city", "distance": 2.11}, {"lat": 36.3158335627, "lon": -94.1810801517, "type": "Alarm", "address": "1803 S 46TH ST, ROGERS, AR", "time": "2025-09-18T15:43:15", "geofence": "Rogers_city", "distance": 3.66}, {"lat": 36.2986918129, "lon": -94.1584742986, "type": "Medical Emergency", "address": "W BONNIE LN, ROGERS, AR", "time": "2025-09-18T15:33:39", "geofence": "Rogers_city", "distance": 3.2}, {"lat": 36.3040791718, "lon": -94.1929234236, "type": "Medical Emergency", "address": "W NORTHGATE RD, ROGERS, AR", "time": "2025-09-18T15:05:57", "geofence": "Rogers_city", "distance": 4.57}, {"lat": 36.3369535445, "lon": -94.1092023475, "type": "Medical Emergency", "address": "N F ST, ROGERS, AR", "time": "2025-09-18T15:00:04", "geofence": "Rogers_city", "distance": 0.62}, {"lat": 36.285740504, "lon": -94.1622728921, "type": "Medical Emergency", "address": "W SOUTHERN HILLS BLVD, ROGERS, AR", "time": "2025-09-18T14:52:11", "geofence": "Rogers_city", "distance": 4.02}, {"lat": 36.3298963898, "lon": -94.0906575426, "type": "Medical Emergency", "address": "E WOODROCK LN, ROGERS, AR", "time": "2025-09-18T13:42:19", "geofence": "Rogers_city", "distance": 1.56}, {"lat": 36.325032386, "lon": -94.197809221, "type": "Expanded Traffic Collision", "address": "S DODSON RD & W REDBUD ST, ROGERS, AR", "time": "2025-09-18T12:38:34", "geofence": "Rogers_city", "distance": 4.44}, {"lat": 36.3100718765, "lon": -94.1720002827, "type": "Medical Emergency", "address": "S BELLVIEW RD, ROGERS, AR", "time": "2025-09-18T06:15:46", "geofence": "Rogers_city", "distance": 3.34}, {"lat": 36.2834835085, "lon": -94.2016453782, "type": "Medical Emergency", "address": "W WOODBINE DR, ROGERS, AR", "time": "2025-09-18T05:51:29", "geofence": "Rogers_city", "distance": 5.72}, {"lat": 36.347314639, "lon": -94.1333497579, "type": "Medical Emergency", "address": "W BISHOP DR, ROGERS, AR", "time": "2025-09-18T00:53:39", "geofence": "Rogers_city", "distance": 1.34}, {"lat": 36.3418222207, "lon": -94.1407600716, "type": "Medical Emergency", "address": "N 16TH ST, ROGERS, AR", "time": "2025-09-17T23:42:04", "geofence": "Rogers_city", "distance": 1.41}, {"lat": 36.3669146808, "lon": -94.1022050136, "type": "Medical Emergency", "address": "N ARKANSAS ST, ROGERS, AR", "time": "2025-09-17T23:08:04", "geofence": "Rogers_city", "distance": 2.58}, {"lat": 36.3248735412, "lon": -94.1872633189, "type": "Medical Emergency", "address": "S 52ND ST, ROGERS, AR", "time": "2025-09-17T21:16:49", "geofence": "Rogers_city", "distance": 3.86}, {"lat": 36.3100627173, "lon": -94.1828605298, "type": "Medical Emergency", "address": "S RIFE MEDICAL LN, ROGERS, AR", "time": "2025-09-17T21:11:45", "geofence": "Rogers_city", "distance": 3.89}, {"lat": 36.3376449403, "lon": -94.1435028552, "type": "Expanded Traffic Collision", "address": "W PERSIMMON ST & N DIXIELAND RD, ROGERS, AR", "time": "2025-09-17T20:18:21", "geofence": "Rogers_city", "distance": 1.45}, {"lat": 36.3101983544, "lon": -94.1665474173, "type": "Medical Emergency", "address": "S HAMPTON PL, ROGERS, AR", "time": "2025-09-17T19:34:30", "geofence": "Rogers_city", "distance": 3.07}, {"lat": 36.3335042052, "lon": -94.1507798867, "type": "Medical Emergency", "address": "W WALNUT ST, ROGERS, AR", "time": "2025-09-17T19:06:05", "geofence": "Rogers_city", "distance": 1.8}];
        
        // Add geofences to map
        Object.entries(geofences).forEach(([name, gf]) => {
            if (gf.polygon_points) {
                // Custom polygon geofence
                const polygon = L.polygon(gf.polygon_points, {
                    color: gf.color,
                    weight: 2,
                    fillColor: gf.color,
                    fillOpacity: 0.2
                }).addTo(map);
                polygon.bindPopup(`<b>${name}</b><br>Custom Area`);
            } else {
                // Circular geofence
                const circle = L.circle([gf.center_lat, gf.center_lon], {
                    radius: gf.radius_miles * 1609.34, // Convert miles to meters
                    color: gf.color,
                    weight: 2,
                    fillColor: gf.color,
                    fillOpacity: 0.2
                }).addTo(map);
                circle.bindPopup(`<b>${name}</b><br>Radius: ${gf.radius_miles} miles`);
            }
        });
        
        // Add incidents to map
        incidents.forEach(incident => {
            const marker = L.circleMarker([incident.lat, incident.lon], {
                radius: 8,
                fillColor: '#ff0000',
                color: '#000',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);
            
            marker.bindPopup(`
                <div class="incident-popup">
                    <div class="incident-type">${incident.type}</div>
                    <div class="incident-address">${incident.address}</div>
                    <div class="incident-time">${incident.time}</div>
                    <div><strong>Geofence:</strong> ${incident.geofence}</div>
                    <div><strong>Distance:</strong> ${incident.distance} miles</div>
                </div>
            `);
        });
        
        // Update legend
        const legendContent = document.getElementById('legend-content');
        Object.entries(geofences).forEach(([name, gf]) => {
            const legendItem = document.createElement('div');
            legendItem.className = 'legend-item';
            legendItem.innerHTML = `
                <span class="legend-color" style="background-color: ${gf.color};"></span>
                ${name}
            `;
            legendContent.appendChild(legendItem);
        });
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            location.reload();
        }, 30000);
        
        console.log('Map loaded with', incidents.length, 'incidents in', Object.keys(geofences).length, 'geofences');
    </script>
</body>
</html>
